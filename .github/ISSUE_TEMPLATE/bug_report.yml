name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: unity
    attributes:
      label: Unity version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Platform and OS version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, personal prompts, model output, and device identifiers.
